name: cli-mastery-eval
description: Evaluation suite for cli-mastery skill — validates trigger routing, curriculum accuracy, and boundary behavior.
skill: cli-mastery
version: "1.1"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: mock
  model: claude-sonnet-4.6
graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 0"
  - type: regex
    name: cli_relevant
    config:
      pattern: "(?i)(slash|command|shortcut|mode|agent|skill|mcp|copilot|cli|module)"
tasks:
  - "tasks/*.yaml"
