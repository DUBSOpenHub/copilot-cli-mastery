id: should-not-trigger-001
name: Should Not Trigger on Unrelated Prompt
description: |
  Test that the skill does NOT activate on unrelated prompts.
  Weather questions should not invoke CLI training content.
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "What is the weather today?"
expected:
  output_not_contains:
    - "Module"
    - "slash command"
    - "cliexpert"
